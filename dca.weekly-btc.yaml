# Weekly BTC DCA — runs every Monday via cron.
# Uses a SEPARATE state_path so it does not collide with the daily DCA's
# BTC-USDC purchase in the ledger (dedup is by run_date + product_id).
discount: 0.02
post_only: true
min_quote_buffer: 0
state_path: ~/.tradebot/dca-weekly.sqlite

assets:
  - product_id: BTC-USDC
    funds: 100
